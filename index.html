<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zimgo - Pantufas</title>

  <!-- FONTE MAIS GORDINHA -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff5e00, #ff9f1c);
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* NUVENS */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.95;
      left: -300px;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud::before {
      width: 60%;
      height: 140%;
      top: -40%;
      left: 10%;
    }

    .cloud::after {
      width: 70%;
      height: 160%;
      top: -60%;
      right: 10%;
    }

    .c1 { width: 220px; height: 70px; }
    .c2 { width: 160px; height: 55px; }
    .c3 { width: 120px; height: 40px; }

    .layer1 .cloud { animation: moveCloud 9s linear infinite; }
    .layer2 .cloud { animation: moveCloud 7s linear infinite; }
    .layer3 .cloud { animation: moveCloud 5s linear infinite; }

    @keyframes moveCloud {
      from { left: -300px; }
      to { left: 110vw; }
    }

    /* LOGO GORDINHO */
    .logo {
      font-family: 'Baloo 2', sans-serif;
      font-size: 64px;
      font-weight: 800;
      color: white;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow:
        0 6px 0 rgba(0,0,0,0.08),
        0 10px 20px rgba(0,0,0,0.2);
    }

    /* CARD */
    .container {
      position: relative;
      z-index: 2;
      background: white;
      padding: 28px;
      border-radius: 25px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .market-text {
      font-size: 13px;
      color: #777;
      margin-bottom: 12px;
    }

    /* BOTÕES */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      margin: 10px 0;
      padding: 13px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.15s ease;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: translateY(3px) scale(0.98);
      box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    }

    .btn img {
      width: 22px;
      pointer-events: none;
    }

    .shopee { background: #FF5200; color: white; }
    .mercado { background: #ffe600; color: black; }
    .whatsapp { background: #25D366; color: white; }

    .help-text {
      margin-top: 18px;
      font-size: 13px;
      color: #555;
    }

    /* RESPONSIVO */
    @media (max-width: 480px) {
      .logo { font-size: 52px; }
    }

  </style>
</head>

<body>

  <!-- NUVENS -->
  <div class="layer1">
    <div class="cloud c1" style="top:10%"></div>
    <div class="cloud c2" style="top:30%; animation-delay:15s"></div>
  </div>

  <div class="layer2">
    <div class="cloud c1" style="top:50%; animation-delay:5s"></div>
    <div class="cloud c3" style="top:70%; animation-delay:20s"></div>
  </div>

  <div class="layer3">
    <div class="cloud c2" style="top:20%; animation-delay:10s"></div>
    <div class="cloud c3" style="top:80%; animation-delay:25s"></div>
  </div>

  <!-- LOGO -->
  <div class="logo">ZIMGO</div>

  <div class="container">
    <div class="market-text">Escolha onde comprar sua pantufa</div>

    <a href="https://shopee.com.br/zimgo" target="_blank" class="btn shopee">
      <img src="https://www.freelogovectors.net/wp-content/uploads/2023/04/shopeelogo-freelogovectors.net_.png">
      Comprar na Shopee
    </a>

    <a href="https://www.mercadolivre.com.br/pantufa-chinelo-de-quarto-unissex-antiderrapante-ultra-macio/up/MLBU3243938544" target="_blank" class="btn mercado">
      <img src="https://www.vanguardati.com.br/imagens/marketplace/mercado-livre/mercado-livre.webp">
      Comprar no Mercado Livre
    </a>

    <div class="help-text">Precisa de ajuda?</div>

    <a href="https://wa.me/5547999840428?text=Olá%20venho%20pelo%20site%20da%20Zimgo!" target="_blank" class="btn whatsapp">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Falar no WhatsApp
    </a>
  </div>

</body>
</html>
